<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>환불 요청 — Vivienne Westwood × 이천쌀</title>

  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="assets/css/custom.css?v=20260710b" rel="stylesheet">

  <style>
    #main.page { margin-top: var(--header-h); }
    .rf-wrap { padding: 70px 0 110px; max-width: 600px; margin: 0 auto; }
    .rf-wrap h1 { font-size: 28px; font-weight: 800; margin: 0 0 8px; }
    .rf-wrap > p { color: var(--grey-600); font-size: 14px; margin: 0 0 34px; }
    .rf-item { display: flex; gap: 14px; align-items: center; padding: 18px; border: 1px solid var(--back-w4); border-radius: 6px; margin-bottom: 30px; }
    .rf-item img { width: 64px; height: 64px; border-radius: 4px; object-fit: cover; }
    .rf-item h3 { font-size: 15px; font-weight: 700; margin: 0 0 3px; }
    .rf-item p { font-size: 12px; color: var(--grey-600); margin: 0; }
    .rf-field { margin-bottom: 18px; }
    .rf-field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .rf-field select, .rf-field textarea { width: 100%; padding: 12px 14px; border: 1px solid var(--back-w4); border-radius: 3px; font-size: 14px; font-family: inherit; }
    .rf-field select:focus, .rf-field textarea:focus { outline: none; border-color: var(--k-black); }
    .rf-toast { position: fixed; left: 50%; bottom: 32px; transform: translate(-50%, 20px); background: var(--k-black); color: #fff; padding: 14px 26px; border-radius: 3px; font-size: 14px; opacity: 0; pointer-events: none; transition: all .3s ease; z-index: 999; }
    .rf-toast.show { opacity: 1; transform: translate(-50%, 0); }
  </style>
</head>

<body>

  <header id="header" class="fixed-top d-flex align-items-center">
  </header>

  <main id="main" class="page">
    <section class="rf-wrap">
      <h1>환불 요청</h1>
      <p>주문번호 VW-ICHEON-260610-0042</p>

      <div class="rf-item">
        <img src="assets/img/products/acc-2.jpg" alt="">
        <div><h3>오브 진주 목걸이 · 골드</h3><p>Color 골드 / Size 45cm · 수량 1 · 72,000 W</p></div>
      </div>

      <form onsubmit="return false">
        <div class="rf-field">
          <label>환불 사유</label>
          <select>
            <option>단순 변심</option>
            <option>상품 불량 / 파손</option>
            <option>오배송</option>
            <option>배송 지연</option>
            <option>기타</option>
          </select>
        </div>
        <div class="rf-field">
          <label>상세 내용</label>
          <textarea rows="4" placeholder="환불 사유를 자세히 적어주세요."></textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:24px">
          <button class="btn-vw btn-vw--solid" type="button" id="rfSubmit" style="flex:1">환불 요청하기</button>
          <a class="btn-vw btn-vw--ghost" href="mypage.html">취소</a>
        </div>
      </form>
    </section>
  </main>

  <div class="rf-toast" id="rfToast">환불 요청이 접수되었습니다.</div>

  <!-- ======= Footer ======= -->
  <footer id="footer">
  </footer>

  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/purecounter/purecounter_vanilla.js"></script>
  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="assets/vendor/isotope-layout/isotope.pkgd.min.js"></script>
  <script src="assets/vendor/swiper/swiper-bundle.min.js"></script>
  <script src="assets/vendor/waypoints/noframework.waypoints.js"></script>
  <script src="assets/vendor/php-email-form/validate.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/app.js?v=20260710b"></script>
  <script>
    document.getElementById('rfSubmit').addEventListener('click', function () {
      var t = document.getElementById('rfToast'); t.classList.add('show');
      setTimeout(function () { t.classList.remove('show'); location.href = 'mypage.html'; }, 1600);
    });
  </script>
</body>
</html>
