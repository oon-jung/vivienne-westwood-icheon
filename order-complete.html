<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>주문완료 — Vivienne Westwood × 이천쌀</title>

  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="assets/css/custom.css?v=20260709" rel="stylesheet">

  <style>
    #main.page { margin-top: var(--header-h); }
    .oc-wrap { padding: 90px 0 110px; max-width: 620px; margin: 0 auto; text-align: center; }
    .oc-ico { width: 76px; height: 76px; border-radius: 50%; background: var(--k-black); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 38px; margin: 0 auto 26px; }
    .oc-wrap h1 { font-size: 30px; font-weight: 800; margin: 0 0 12px; }
    .oc-wrap > p { color: var(--grey-600); font-size: 15px; margin: 0 0 36px; }
    .oc-card { border: 1px solid var(--back-w4); border-radius: 6px; padding: 28px; text-align: left; margin-bottom: 28px; }
    .oc-card .row { display: flex; justify-content: space-between; font-size: 14px; padding: 9px 0; border-bottom: 1px solid var(--back-w2); }
    .oc-card .row:last-child { border-bottom: 0; }
    .oc-card .row span:first-child { color: var(--grey-600); }
    .oc-card .row span:last-child { font-weight: 700; color: var(--grey-900); }
    .oc-acts { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>

<body>

  <header id="header" class="fixed-top d-flex align-items-center">
  </header>

  <main id="main" class="page">
    <section class="oc-wrap">
      <div class="oc-ico"><i class="bi bi-check-lg"></i></div>
      <h1>주문이 완료되었습니다</h1>
      <p>비비안 행성에서 이천 임금님표 쌀이 출발합니다. 주문 내역은 마이페이지에서 확인하실 수 있습니다.</p>

      <!-- 최근 주문(vwOrders)을 JS가 채움 -->
      <div class="oc-card">
        <div class="row"><span>주문번호</span><span id="ocNo">—</span></div>
        <div class="row"><span>주문상품</span><span id="ocItems">—</span></div>
        <div class="row"><span>결제금액</span><span id="ocTotal">—</span></div>
        <div class="row"><span>배송지</span><span id="ocAddr">—</span></div>
        <div class="row"><span>예상 배송</span><span>2 – 3일 이내 도착</span></div>
      </div>

      <div class="oc-acts">
        <a class="btn-vw btn-vw--solid" href="shipping.html">배송 확인</a>
        <a class="btn-vw btn-vw--ghost" href="refund.html">환불 요청</a>
        <a class="btn-vw btn-vw--ghost" href="mypage.html">마이페이지</a>
      </div>
    </section>
  </main>

  <!-- ======= Footer ======= -->
  <footer id="footer">
  </footer>

  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/app.js?v=20260709"></script>
  <script>
    (function () {
      const orders = VW.getOrders();
      const order = orders[orders.length - 1];

      // 주문 없이 직접 진입하면 주문 흐름의 시작(장바구니)으로
      if (!order) { location.replace('cart.html'); return; }

      const extraCount = order.items.length - 1;
      document.getElementById('ocNo').textContent = order.no;
      document.getElementById('ocItems').textContent = order.items[0].name + (extraCount > 0 ? ' 외 ' + extraCount + '건' : '');
      document.getElementById('ocTotal').textContent = VW.formatWon(order.total);
      document.getElementById('ocAddr').textContent = order.addr;
    })();
  </script>
</body>
</html>
