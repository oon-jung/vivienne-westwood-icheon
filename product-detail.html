<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>오브 진주 목걸이 — Vivienne Westwood × 이천쌀</title>

  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <!-- Moderna template — https://bootstrapmade.com/  License: https://bootstrapmade.com/license/ -->

  <style>
    #main.page { margin-top: var(--header-h); }
    .pd-wrap { padding: 56px 0 110px; }
    .pd-crumb { font-size: 13px; color: var(--grey-600); margin-bottom: 28px; }
    .pd-crumb a { color: var(--grey-600); } .pd-crumb a:hover { color: var(--k-black); }
    .pd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
    .pd-media { display: grid; grid-template-columns: 64px 1fr; gap: 14px; }
    .pd-thumbs { display: flex; flex-direction: column; gap: 10px; }
    .pd-thumbs button { width: 64px; height: 64px; padding: 0; border: 1px solid var(--back-w4); background: var(--back-w2); border-radius: 3px; cursor: pointer; overflow: hidden; }
    .pd-thumbs button.is-active { border-color: var(--k-black); }
    .pd-thumbs img { width: 100%; height: 100%; object-fit: cover; }
    .pd-main { aspect-ratio: 1/1; background: var(--back-w2); border: 1px solid var(--back-w4); border-radius: 4px; overflow: hidden; }
    .pd-main img { width: 100%; height: 100%; object-fit: cover; }

    .pd-info .cat { font-size: 13px; letter-spacing: .12em; text-transform: uppercase; color: var(--grey-600); margin: 0 0 10px; }
    .pd-info h1 { font-size: 30px; font-weight: 800; color: var(--grey-900); margin: 0 0 14px; }
    .pd-price { font-size: 26px; font-weight: 800; color: var(--k-black); margin: 0 0 24px; }
    .pd-desc { font-size: 14px; line-height: 1.8; color: var(--grey-700); margin: 0 0 30px; padding-bottom: 28px; border-bottom: 1px solid var(--back-w4); }

    .pd-opt { margin-bottom: 22px; }
    .pd-opt label { display: block; font-size: 13px; font-weight: 700; color: var(--grey-900); margin-bottom: 10px; }
    .pd-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .pd-chip { padding: 9px 16px; font-size: 13px; font-weight: 600; border: 1px solid var(--back-w4); border-radius: 2px; background: #fff; color: var(--grey-800); cursor: pointer; transition: all .2s ease; }
    .pd-chip.is-active { border-color: var(--k-black); background: var(--k-black); color: #fff; }
    .pd-swatch { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--back-w4); cursor: pointer; padding: 0; }
    .pd-swatch.is-active { outline: 2px solid var(--k-black); outline-offset: 2px; }

    .pd-qty { display: inline-flex; align-items: center; border: 1px solid var(--back-w4); border-radius: 2px; overflow: hidden; }
    .pd-qty button { width: 40px; height: 42px; border: 0; background: #fff; font-size: 18px; cursor: pointer; }
    .pd-qty input { width: 52px; height: 42px; border: 0; text-align: center; font-size: 15px; font-weight: 600; }

    .pd-actions { display: flex; gap: 10px; margin-top: 30px; }
    .pd-actions .btn-vw { flex: 1; }
    .pd-wish { width: 52px; flex: 0 0 auto !important; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .pd-wish.is-on { color: #c1121f; border-color: #c1121f; }
    .pd-wish.is-on i::before { content: "\f415"; }

    .pd-toast { position: fixed; left: 50%; bottom: 32px; transform: translate(-50%, 20px); background: var(--k-black); color: #fff; padding: 14px 26px; border-radius: 3px; font-size: 14px; opacity: 0; pointer-events: none; transition: all .3s ease; z-index: 999; }
    .pd-toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 991px) { .pd-grid { grid-template-columns: 1fr; gap: 32px; } }
  </style>
</head>

<body>

  <!-- ======= Header ======= -->
  <header id="header" class="fixed-top d-flex align-items-center">
  </header>

  <main id="main" class="page">
    <section class="pd-wrap">
      <div class="container">
        <p class="pd-crumb"><a href="products.html">Products</a> / <a href="products.html#acc">ACC</a> / 오브 진주 목걸이</p>
        <div class="pd-grid">
          <!-- 좌: 이미지 -->
          <div class="pd-media" data-aos="fade-up">
            <div class="pd-thumbs">
              <button class="is-active" data-img="assets/img/products/acc-1.jpg"><img src="assets/img/products/acc-1.jpg" alt=""></button>
              <button data-img="assets/img/products/acc-2.jpg"><img src="assets/img/products/acc-2.jpg" alt=""></button>
            </div>
            <div class="pd-main"><img id="pdMain" src="assets/img/products/acc-1.jpg" alt="오브 진주 목걸이"></div>
          </div>

          <!-- 우: 정보 + 옵션 -->
          <div class="pd-info" data-aos="fade-up" data-aos-delay="100">
            <p class="cat">Accessories</p>
            <h1>오브 진주 목걸이</h1>
            <p class="pd-price">72,000 W</p>
            <p class="pd-desc">진주처럼 빛나는 쌀알을 비비안의 오브에 담아낸 콜라보 목걸이. 토성의 고리와 왕관 모티프가 어우러진 시그니처 피스입니다.</p>

            <div class="pd-opt">
              <label>Color</label>
              <div class="pd-chips" data-group="color">
                <button class="pd-swatch is-active" style="background:#d9d9d9" data-val="실버" aria-label="실버"></button>
                <button class="pd-swatch" style="background:#c9a227" data-val="골드" aria-label="골드"></button>
              </div>
            </div>
            <div class="pd-opt">
              <label>Size</label>
              <div class="pd-chips" data-group="size">
                <button class="pd-chip is-active" data-val="40cm">40cm</button>
                <button class="pd-chip" data-val="45cm">45cm</button>
                <button class="pd-chip" data-val="50cm">50cm</button>
              </div>
            </div>
            <div class="pd-opt">
              <label>수량</label>
              <div class="pd-qty">
                <button type="button" id="qtyMinus">−</button>
                <input id="qty" type="text" value="1" readonly>
                <button type="button" id="qtyPlus">+</button>
              </div>
            </div>

            <div class="pd-actions">
              <button class="btn-vw btn-vw--ghost pd-wish" type="button" id="pdWish" aria-label="위시리스트"><i class="bi bi-heart"></i></button>
              <button class="btn-vw btn-vw--ghost" type="button" id="addCart">ADD TO CART</button>
              <a class="btn-vw btn-vw--solid" href="checkout.html" id="getNow">Get now</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="pd-toast" id="pdToast">장바구니에 담았습니다.</div>
  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>

  <!-- ======= Footer ======= -->
  <footer id="footer">
  </footer>

  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    (function () {
      // 썸네일 → 메인 이미지
      var main = document.getElementById('pdMain');
      document.querySelectorAll('.pd-thumbs button').forEach(function (b) {
        b.addEventListener('click', function () {
          document.querySelectorAll('.pd-thumbs button').forEach(function (x) { x.classList.remove('is-active'); });
          b.classList.add('is-active'); main.src = b.dataset.img;
        });
      });
      // 옵션 선택
      document.querySelectorAll('.pd-chips').forEach(function (g) {
        g.querySelectorAll('button').forEach(function (btn) {
          btn.addEventListener('click', function () {
            g.querySelectorAll('button').forEach(function (x) { x.classList.remove('is-active'); });
            btn.classList.add('is-active');
          });
        });
      });
      // 수량
      var qty = document.getElementById('qty');
      document.getElementById('qtyPlus').addEventListener('click', function () { qty.value = (+qty.value) + 1; });
      document.getElementById('qtyMinus').addEventListener('click', function () { if (+qty.value > 1) qty.value = (+qty.value) - 1; });
      // 위시리스트
      document.getElementById('pdWish').addEventListener('click', function () { this.classList.toggle('is-on'); });
      // 장바구니 토스트
      var toast = document.getElementById('pdToast');
      document.getElementById('addCart').addEventListener('click', function () {
        toast.classList.add('show'); setTimeout(function () { toast.classList.remove('show'); }, 1800);
      });
    })();
  </script>
</body>
</html>
