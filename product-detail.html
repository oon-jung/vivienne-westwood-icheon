<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>오브 진주 목걸이 — Vivienne Westwood × 이천쌀</title>

  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <!-- Moderna template — https://bootstrapmade.com/  License: https://bootstrapmade.com/license/ -->

  <style>
    #main.page { margin-top: var(--header-h); }
    .pd-wrap { padding: 56px 0 110px; }
    .pd-crumb { font-size: 13px; color: var(--grey-600); margin-bottom: 28px; }
    .pd-crumb a { color: var(--grey-600); } .pd-crumb a:hover { color: var(--k-black); }
    .pd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
    .pd-media { display: grid; grid-template-columns: 64px 1fr; gap: 14px; }
    .pd-thumbs { display: flex; flex-direction: column; gap: 10px; }
    .pd-thumbs button { width: 64px; height: 64px; padding: 0; border: 1px solid var(--back-w4); background: var(--back-w2); border-radius: 3px; cursor: pointer; overflow: hidden; }
    .pd-thumbs button.is-active { border-color: var(--k-black); }
    .pd-thumbs img { width: 100%; height: 100%; object-fit: cover; }
    .pd-main { aspect-ratio: 1/1; background: var(--back-w2); border: 1px solid var(--back-w4); border-radius: 4px; overflow: hidden; }
    .pd-main img { width: 100%; height: 100%; object-fit: cover; }

    .pd-info .cat { font-size: 13px; letter-spacing: .12em; text-transform: uppercase; color: var(--grey-600); margin: 0 0 10px; }
    .pd-info h1 { font-size: 30px; font-weight: 800; color: var(--grey-900); margin: 0 0 14px; }
    .pd-price { font-size: 26px; font-weight: 800; color: var(--k-black); margin: 0 0 24px; }
    .pd-desc { font-size: 14px; line-height: 1.8; color: var(--grey-700); margin: 0 0 30px; padding-bottom: 28px; border-bottom: 1px solid var(--back-w4); }

    .pd-opt { margin-bottom: 22px; }
    .pd-opt label { display: block; font-size: 13px; font-weight: 700; color: var(--grey-900); margin-bottom: 10px; }
    .pd-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .pd-chip { padding: 9px 16px; font-size: 13px; font-weight: 600; border: 1px solid var(--back-w4); border-radius: 2px; background: #fff; color: var(--grey-800); cursor: pointer; transition: all .2s ease; }
    .pd-chip.is-active { border-color: var(--k-black); background: var(--k-black); color: #fff; }
    .pd-swatch { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--back-w4); cursor: pointer; padding: 0; }
    .pd-swatch.is-active { outline: 2px solid var(--k-black); outline-offset: 2px; }

    .pd-qty { display: inline-flex; align-items: center; border: 1px solid var(--back-w4); border-radius: 2px; overflow: hidden; }
    .pd-qty button { width: 40px; height: 42px; border: 0; background: #fff; font-size: 18px; cursor: pointer; }
    .pd-qty input { width: 52px; height: 42px; border: 0; text-align: center; font-size: 15px; font-weight: 600; }

    .pd-actions { display: flex; gap: 10px; margin-top: 30px; }
    .pd-actions .btn-vw { flex: 1; }
    .pd-wish { width: 52px; flex: 0 0 auto !important; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .pd-wish.is-on { color: #c1121f; border-color: #c1121f; }
    .pd-wish.is-on i::before { content: "\f415"; }

    .pd-toast { position: fixed; left: 50%; bottom: 32px; transform: translate(-50%, 20px); background: var(--k-black); color: #fff; padding: 14px 26px; border-radius: 3px; font-size: 14px; opacity: 0; pointer-events: none; transition: all .3s ease; z-index: 999; }
    .pd-toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 991px) { .pd-grid { grid-template-columns: 1fr; gap: 32px; } }
    @media (max-width: 575px) {
      /* 좁은 화면에서 위시+ADD TO CART+Get now 3버튼이 비좁지 않게 */
      .pd-actions .btn-vw { padding-left: 12px; padding-right: 12px; font-size: 13px; }
    }
  </style>
</head>

<body>

  <!-- ======= Header ======= -->
  <header id="header" class="fixed-top d-flex align-items-center">
  </header>

  <main id="main" class="page">
    <section class="pd-wrap">
      <div class="container">
        <p class="pd-crumb" id="pdCrumb"><a href="products.html">Products</a></p>
        <div class="pd-grid">
          <!-- 좌: 이미지 (카탈로그 기준으로 JS가 채움) -->
          <div class="pd-media" data-aos="fade-up">
            <div class="pd-thumbs" id="pdThumbs"></div>
            <div class="pd-main"><img id="pdMain" src="" alt=""></div>
          </div>

          <!-- 우: 정보 + 옵션 (URL ?id= 상품 기준으로 JS가 채움) -->
          <div class="pd-info" data-aos="fade-up" data-aos-delay="100">
            <p class="cat" id="pdCat"></p>
            <h1 id="pdName"></h1>
            <p class="pd-price" id="pdPrice"></p>
            <p class="pd-desc" id="pdDesc"></p>

            <div id="pdOpts"></div>
            <div class="pd-opt">
              <label>수량</label>
              <div class="pd-qty">
                <button type="button" id="qtyMinus">−</button>
                <input id="qty" type="text" value="1" readonly>
                <button type="button" id="qtyPlus">+</button>
              </div>
            </div>

            <div class="pd-actions">
              <button class="btn-vw btn-vw--ghost pd-wish" type="button" id="pdWish" aria-label="위시리스트"><i class="bi bi-heart"></i></button>
              <button class="btn-vw btn-vw--ghost" type="button" id="addCart">ADD TO CART</button>
              <a class="btn-vw btn-vw--solid" href="checkout.html" id="getNow">Get now</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="pd-toast" id="pdToast">장바구니에 담았습니다.</div>
  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>

  <!-- ======= Footer ======= -->
  <footer id="footer">
  </footer>

  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    (function () {
      // URL ?id=&opt= 로 상품 결정 (카탈로그 = app.js VW.PRODUCTS, 기본값 목걸이)
      const params = new URLSearchParams(location.search);
      const productId = VW.PRODUCTS[params.get('id')] ? params.get('id') : 'necklace';
      const product = VW.PRODUCTS[productId];

      const requestedOption = product.options.find(function (option) { return option.val === params.get('opt'); });
      const state = {
        opt: (requestedOption || product.options[0]).val,
        size: product.sizes ? product.sizes[0] : null,
        qty: 1
      };

      const mainImage = document.getElementById('pdMain');
      const wishButton = document.getElementById('pdWish');

      function currentOption() {
        return VW.findOption(productId, state.opt);
      }

      function setImage(src) {
        mainImage.src = src;
        mainImage.alt = product.name;
        document.querySelectorAll('#pdThumbs button').forEach(function (button) {
          button.classList.toggle('is-active', button.dataset.img === src);
        });
      }

      function renderInfo() {
        document.title = product.name + ' — Vivienne Westwood × 이천쌀';
        document.getElementById('pdCrumb').innerHTML =
          '<a href="products.html">Products</a> / <a href="products.html#' + product.tab + '">' + product.cat + '</a> / ' + product.name;
        document.getElementById('pdCat').textContent = product.cat;
        document.getElementById('pdName').textContent = product.name;
        document.getElementById('pdDesc').textContent = product.desc;
      }

      function renderThumbs() {
        const images = product.options.map(function (option) { return option.img; })
          .filter(function (img, index, all) { return all.indexOf(img) === index; });
        const thumbsBox = document.getElementById('pdThumbs');

        if (images.length < 2) {
          // 단일 이미지 상품은 썸네일 칼럼 생략
          thumbsBox.style.display = 'none';
          document.querySelector('.pd-media').style.gridTemplateColumns = '1fr';
        } else {
          thumbsBox.innerHTML = images.map(function (img) {
            return '<button type="button" data-img="' + img + '"><img src="' + img + '" alt=""></button>';
          }).join('');
          thumbsBox.querySelectorAll('button').forEach(function (button) {
            button.addEventListener('click', function () { setImage(button.dataset.img); });
          });
        }
        setImage(currentOption().img);
      }

      function renderOptions() {
        const optionsBox = document.getElementById('pdOpts');
        let html = '<div class="pd-opt"><label>' + product.optionLabel + '</label><div class="pd-chips" data-group="opt">' +
          product.options.map(function (option) {
            if (option.hex) {
              return '<button type="button" class="pd-swatch" style="background:' + option.hex + '" data-val="' + option.val + '" aria-label="' + option.val + '"></button>';
            }
            return '<button type="button" class="pd-chip" data-val="' + option.val + '">' + option.val + '</button>';
          }).join('') + '</div></div>';

        if (product.sizes) {
          html += '<div class="pd-opt"><label>' + product.sizeLabel + '</label><div class="pd-chips" data-group="size">' +
            product.sizes.map(function (size) {
              return '<button type="button" class="pd-chip" data-val="' + size + '">' + size + '</button>';
            }).join('') + '</div></div>';
        }
        optionsBox.innerHTML = html;

        optionsBox.querySelectorAll('[data-group="opt"] button').forEach(function (button) {
          button.addEventListener('click', function () { state.opt = button.dataset.val; syncOption(); });
        });
        optionsBox.querySelectorAll('[data-group="size"] button').forEach(function (button) {
          button.addEventListener('click', function () { state.size = button.dataset.val; syncSize(); });
        });
      }

      function syncOption() {
        document.querySelectorAll('[data-group="opt"] button').forEach(function (button) {
          button.classList.toggle('is-active', button.dataset.val === state.opt);
        });
        document.getElementById('pdPrice').textContent = VW.formatWon(currentOption().price);
        setImage(currentOption().img);
        wishButton.classList.toggle('is-on', VW.isWished(productId, state.opt));
      }

      function syncSize() {
        document.querySelectorAll('[data-group="size"] button').forEach(function (button) {
          button.classList.toggle('is-active', button.dataset.val === state.size);
        });
      }

      // 수량
      const quantityInput = document.getElementById('qty');
      document.getElementById('qtyPlus').addEventListener('click', function () {
        state.qty += 1; quantityInput.value = state.qty;
      });
      document.getElementById('qtyMinus').addEventListener('click', function () {
        if (state.qty > 1) { state.qty -= 1; quantityInput.value = state.qty; }
      });

      // 위시리스트 — vwWish 저장(마이페이지 연동)
      wishButton.addEventListener('click', function () {
        wishButton.classList.toggle('is-on', VW.toggleWish(productId, state.opt));
      });

      // 장바구니 — vwCart 저장(장바구니·주문서 연동)
      const toast = document.getElementById('pdToast');
      document.getElementById('addCart').addEventListener('click', function () {
        VW.addToCart(productId, state.opt, state.size, state.qty);
        toast.classList.add('show');
        setTimeout(function () { toast.classList.remove('show'); }, 1800);
      });

      // 바로 구매 — 장바구니에 담고 주문서로
      document.getElementById('getNow').addEventListener('click', function (event) {
        event.preventDefault();
        VW.addToCart(productId, state.opt, state.size, state.qty);
        location.href = 'checkout.html';
      });

      renderInfo();
      renderThumbs();
      renderOptions();
      syncOption();
      syncSize();
    })();
  </script>
</body>
</html>
