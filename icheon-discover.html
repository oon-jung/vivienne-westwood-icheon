<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>놀거리 — Icheon | Vivienne Westwood × 이천쌀</title>
  <meta content="이천 놀거리 — Couples · Friends · Families 코스" name="description">

  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="assets/css/custom.css?v=20260710e" rel="stylesheet">
  <!-- Moderna template — https://bootstrapmade.com/  License: https://bootstrapmade.com/license/ -->

  <style>
    #main.page { margin-top: var(--header-h); }
    .ic-sec { padding: 80px 0 96px; }
    .disc-hero { margin-bottom: 34px; }

    /* 탭 */
    /* 활성 탭 밑줄이 구분선 위에 얹히도록(둘 사이 8px 뜨던 간격 제거) */
    .disc-tabs { display: flex; align-items: center; justify-content: center; gap: 38px; margin-bottom: 36px; border-bottom: 1px solid var(--back-w4); }
    .disc-tab { background: none; border: 0; font-size: 16px; font-weight: 600; color: #9a9a9a; cursor: pointer; padding: 0 2px 12px; margin-bottom: -1px; border-bottom: 2px solid transparent; transition: color .2s ease, border-color .2s ease; }
    .disc-tab.is-active { color: var(--k-black); border-bottom-color: var(--k-black); }
    .disc-tab__short { display: none; }

    /* 콜라주 (Figma 프레임 그대로) */
    .disc-stage { border-radius: 6px; overflow: hidden; box-shadow: 0 9px 20px rgba(16,16,16,.08); }
    .disc-panel { display: none; }
    .disc-panel.is-active { display: block; }
    .disc-panel img { width: 100%; height: auto; display: block; }

    .disc-hint { display: none; }

    @media (max-width: 575px) {
      /* 탭 3개를 한 줄에 — 두 줄로 갈라지던 그리드 배치 제거 */
      .disc-tabs {
        gap: 26px;
        margin-bottom: 24px;
      }
      .disc-tab {
        font-size: 14px;
        padding: 0 2px 10px;
        white-space: nowrap;
      }
      .disc-tab__full { display: none; }
      .disc-tab__short { display: inline; }

      /* 콜라주: 축소해 통째로 구겨넣지 않고, 높이 기준으로 크게 두고 가로 스와이프 */
      .disc-stage {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin: 0 calc(var(--bs-gutter-x, 1.5rem) / -2);
        border-radius: 0;
      }
      .disc-panel img { width: auto; height: 620px; max-width: none; }
      .disc-hint {
        display: block;
        margin: 14px 0 0;
        text-align: center;
        font-size: 12px;
        color: var(--grey-600);
      }
    }
  </style>
</head>

<body>

  <!-- ======= Header ======= -->
  <header id="header" class="fixed-top d-flex align-items-center">
  </header>

  <main id="main" class="page">

    <section id="discover" class="ic-sec" data-tab-root>
      <div class="container">
        <div class="disc-hero ic-hero-nav" data-aos="fade-up">
          <button class="ic-hero-nav__btn ic-hero-nav__btn--prev" type="button" data-disc-prev aria-label="이전 페이지 — Food" title="Food"><i class="bi bi-chevron-left"></i></button>
          <div class="ic-hero-nav__copy">
            <p class="eyebrow">비비안과 함께하는 이천의 새로운 탐색</p>
            <h2 class="ic-hero-nav__title">DISCOVER ICHEON</h2>
            <p class="ic-hero-nav__sub">Rediscover Icheon With Vivian</p>
          </div>
          <button class="ic-hero-nav__btn ic-hero-nav__btn--next" type="button" data-disc-next aria-label="다음 페이지 — Festivals" title="Festivals"><i class="bi bi-chevron-right"></i></button>
        </div>

        <div class="disc-tabs" data-aos="fade-up">
          <button class="disc-tab is-active" type="button" data-tab-target="couples"><span class="disc-tab__full">For Couples</span><span class="disc-tab__short">Couples</span></button>
          <button class="disc-tab" type="button" data-tab-target="friends"><span class="disc-tab__full">With Friends</span><span class="disc-tab__short">Friends</span></button>
          <button class="disc-tab" type="button" data-tab-target="families"><span class="disc-tab__full">For Families</span><span class="disc-tab__short">Families</span></button>
        </div>

        <div class="disc-stage" data-aos="fade-up">
          <div class="disc-panel is-active" data-tab-panel="couples">
            <img src="assets/img/icheon/disc/collage-couples.jpg" alt="For Couples — 설봉공원 · 시몬스테라스 · 이진상회">
          </div>
          <div class="disc-panel" data-tab-panel="friends">
            <img src="assets/img/icheon/disc/collage-friends.jpg" alt="With Friends — 시몬스테라스 · 설봉공원 · 이진상회">
          </div>
          <div class="disc-panel" data-tab-panel="families">
            <img src="assets/img/icheon/disc/collage-families.jpg" alt="For Families — 설봉공원 · 시몬스테라스 · 이진상회">
          </div>
        </div>
        <p class="disc-hint" aria-hidden="true">← 옆으로 밀어 콜라주 전체를 살펴보세요 →</p>
      </div>
    </section>

  </main>

  <!-- ======= Footer ======= -->
  <footer id="footer">
  </footer>

  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>

  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/purecounter/purecounter_vanilla.js"></script>
  <script src="assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="assets/vendor/isotope-layout/isotope.pkgd.min.js"></script>
  <script src="assets/vendor/swiper/swiper-bundle.min.js"></script>
  <script src="assets/vendor/waypoints/noframework.waypoints.js"></script>
  <script src="assets/vendor/php-email-form/validate.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/app.js?v=20260710e"></script>
  <script>
    (function () {
      // 코스(커플/친구/가족)는 탭 버튼으로 전환. 제목 화살표 = 이천 3개 페이지 무한 순환.
      const dPrev = document.querySelector('[data-disc-prev]');
      const dNext = document.querySelector('[data-disc-next]');
      if (dPrev) dPrev.addEventListener('click', function () { window.location.href = 'icheon.html'; });
      if (dNext) dNext.addEventListener('click', function () { window.location.href = 'icheon-festival.html'; });
    })();
  </script>
</body>
</html>
