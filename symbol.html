  <style>
    #main.page { margin-top: var(--header-h); }
    .sy-head { text-align: center; padding: 80px 0 12px; }
    .sy-head .eyebrow { color: var(--grey-600); }
    .sy-head h1 { font-size: clamp(30px, 4.4vw, 52px); font-weight: 800; color: var(--grey-900); margin: 8px 0 14px; }
    .sy-head p { color: var(--grey-600); font-size: 15px; margin: 0; }
    .sy-hint { display: inline-flex; align-items: center; gap: 8px; margin-top: 18px; font-size: 13px; color: var(--grey-600); }
    .sy-hint i { font-size: 18px; }

    /* 가로 스크롤 스냅 캐러셀 — 휠 굴리면 옆으로 한 단계씩 '딱' */
    .sy-stage { padding: 30px 0 70px; }
    .sy-rail {
      display: flex; gap: 0; overflow-x: auto;
      scroll-snap-type: x proximity; scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
      padding: 30px 0;
    }
    /* 앞뒤 스페이서: 첫·마지막 슬라이드도 화면 중앙에 올 수 있게 ((100% - 슬라이드 46%)/2).
       컨테이너 padding을 쓰면 %flex-basis가 줄어 중앙정렬이 깨지므로 스페이서로 처리. */
    .sy-rail::before, .sy-rail::after { content: ""; flex: 0 0 27%; }
    .sy-rail::-webkit-scrollbar { display: none; }
    .sy-slide {
      scroll-snap-align: center; scroll-snap-stop: always;
      flex: 0 0 46%; margin: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 0 3%;
    }
    .sy-slide__img {
      width: 100%; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden;
      background: var(--back-w2); display: flex; align-items: center; justify-content: center;
      transition: transform .45s ease, box-shadow .45s ease, opacity .45s ease;
      opacity: .4; transform: scale(.82);
    }
    .sy-slide__img img { width: 100%; height: 100%; object-fit: cover; }
    .sy-slide.is-center .sy-slide__img { opacity: 1; transform: scale(1); box-shadow: 0 14px 30px rgba(16,16,16,.12); }
    .sy-slide__cap { margin-top: 22px; text-align: center; opacity: 0; transition: opacity .4s ease; }
    .sy-slide.is-center .sy-slide__cap { opacity: 1; }
    .sy-slide__cap .no { font-family: var(--font-display); font-size: 14px; color: var(--grey-600); letter-spacing: .1em; }
    .sy-slide__cap h3 { font-size: 18px; font-weight: 700; color: var(--grey-900); margin: 4px 0 0; }

    .sy-nav { display: flex; justify-content: center; gap: 14px; margin-top: 10px; }
    .sy-nav button { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--back-w4); background: #fff;
      color: var(--k-black); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s ease; }
    .sy-nav button:hover { background: var(--k-black); color: #fff; border-color: var(--k-black); }
    .sy-dots { display: flex; justify-content: center; gap: 8px; margin-top: 26px; }
    .sy-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--back-w4); transition: all .2s ease; }
    .sy-dots span.is-on { background: var(--k-black); width: 22px; border-radius: 5px; }

    @media (max-width: 991px) {
      .sy-slide { flex-basis: 78%; }
      .sy-rail::before, .sy-rail::after { flex-basis: 11%; }
    }

  <script>
    // 심볼 가로 캐러셀 — 휠→가로, 화살표/도트, 중앙 강조
    (function () {
      const rail = document.querySelector('[data-symbol-rail]');
      if (!rail) return;
      const slides = Array.from(rail.querySelectorAll('.sy-slide'));
      const dots = document.querySelector('[data-sym-dots]');
      slides.forEach(function (slide, index) {
        const dot = document.createElement('span');
        dot.dataset.i = index;
        dots.appendChild(dot);
      });
      const dotEls = Array.from(dots.children);

      // 스마트 휠: 한 번 굴리면 한 슬라이드씩 '딱' 이동 (연속 스크롤 대신 스냅 단계 이동)
      // 트랙패드 관성으로 여러 칸 튀지 않게 쿨다운(lock)을 둔다. 레일 끝이면 페이지 세로 스크롤 허용.
      let wheelLock = false;
      rail.addEventListener('wheel', function (e) {
        if (Math.abs(e.deltaY) < Math.abs(e.deltaX)) return; // 가로 제스처는 그대로
        const dir = e.deltaY > 0 ? 1 : -1;
        const atStart = rail.scrollLeft <= 1;
        const atEnd = rail.scrollLeft + rail.clientWidth >= rail.scrollWidth - 1;
        if ((dir < 0 && atStart) || (dir > 0 && atEnd)) return; // 끝에서 더 굴리면 페이지 스크롤
        e.preventDefault();
        if (wheelLock) return;
        wheelLock = true;
        go(centerIndex() + dir);
        setTimeout(function () { wheelLock = false; }, 480);
      }, { passive: false });

      function centerIndex() {
        const mid = rail.scrollLeft + rail.clientWidth / 2;
        let best = 0;
        let bestDistance = Infinity;
        slides.forEach(function (slide, index) {
          const center = slide.offsetLeft + slide.offsetWidth / 2;
          const distance = Math.abs(center - mid);
          if (distance < bestDistance) {
            bestDistance = distance;
            best = index;
          }
        });
        return best;
      }
      function mark() {
        const currentIndex = centerIndex();
        slides.forEach(function (slide, index) { slide.classList.toggle('is-center', index === currentIndex); });
        dotEls.forEach(function (dot, index) { dot.classList.toggle('is-on', index === currentIndex); });
      }
      function go(index) {
        const nextIndex = Math.max(0, Math.min(slides.length - 1, index));
        const slide = slides[nextIndex];
        rail.scrollTo({ left: slide.offsetLeft - (rail.clientWidth - slide.offsetWidth) / 2, behavior: 'smooth' });
      }
      rail.addEventListener('scroll', function () { window.requestAnimationFrame(mark); });
      document.querySelector('[data-sym-prev]').addEventListener('click', function () { go(centerIndex() - 1); });
      document.querySelector('[data-sym-next]').addEventListener('click', function () { go(centerIndex() + 1); });
      dotEls.forEach(function (dot) { dot.addEventListener('click', function () { go(+dot.dataset.i); }); });
      // 초기 상태: 1번 슬라이드를 화면 중앙에 두고 강조 (스냅이 2번으로 튀지 않게 명시적으로 0으로)
      rail.scrollLeft = 0;
      mark();
      window.addEventListener('load', function () { rail.scrollLeft = 0; mark(); });
    })();
  </script>
