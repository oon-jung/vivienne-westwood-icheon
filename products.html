  <!-- 페이지 전용 스타일 (Figma 기반 · 자기완결) -->
  <style>
    #main.page { margin-top: var(--header-h); }

    /* padding:0 — 템플릿 section 기본 패딩(60px 0) 제거: 히어로 위·아래 흰 빈칸 방지 */
    .pv-hero { position: relative; background: #fff; padding: 0; }
    .pv-hero img { display: block; width: 100%; height: 500px; object-fit: cover; object-position: center; }

    .pv-wrap { padding: 52px 0 118px; background: #fff; }
    .pv-tabs {
      display: flex;
      justify-content: center;
      gap: clamp(48px, 9vw, 116px);
      border-bottom: 1px solid #d9d9d9;
      margin-bottom: 54px;
    }
    .pv-tab {
      min-width: 124px;
      background: none;
      border: 0;
      padding: 0 4px 28px;
      margin-bottom: -2px;
      font-size: 19px;
      font-weight: 500;
      line-height: 1;
      color: #8f8f8f;
      cursor: pointer;
      border-bottom: 5px solid transparent;
      transition: color .2s ease, border-color .2s ease;
    }
    .pv-tab:hover { color: var(--grey-900); }
    .pv-tab.is-active { color: var(--k-black); border-bottom-color: var(--k-black); }

    .pv-grid { display: none; grid-template-columns: repeat(2, minmax(0, 460px)); justify-content: center; gap: 54px 90px; }
    .pv-grid.is-active { display: grid; }

    /* 가격+Get now(.pv-card__body)는 카드 하단에 절대배치 = 카드 내부(웹·모바일 동일).
       media의 padding-bottom이 그 자리를 비워둬서 contain 이미지와 겹치지 않는다.
       배경 #ededed = 제품 이미지 배경과 동일 → 카드 전체가 한 덩어리로 보임(가격·CTA가 카드 안). */
    .pv-card { position: relative; display: flex; flex-direction: column; min-width: 0; }
    .pv-card__media {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 520px;
      padding-bottom: 76px;
      overflow: hidden;
      background: #ededed;
      border: 0;
      border-radius: 0;
    }
    .pv-card__media img { width: 100%; height: 100%; object-fit: contain; object-position: center; transition: transform .5s ease; }
    .pv-card:hover .pv-card__media img { transform: scale(1.05); }
    .pv-card__label {
      position: absolute;
      left: 28px;
      top: 22px;
      z-index: 2;
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: #141a22;
      letter-spacing: -.02em;
    }
    .pv-card__wish {
      position: absolute; top: 12px; right: 12px; width: 38px; height: 38px; border: 0; border-radius: 50%;
      background: rgba(255,255,255,.92); color: var(--k-black); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .2s ease;
    }
    .pv-card__wish:hover { background: var(--k-black); color: #fff; }
    .pv-card__wish.is-on { color: var(--c-red, #c1121f); }
    .pv-card__wish.is-on i::before { content: "\f415"; } /* bi-heart-fill */

    .pv-card__body { position: absolute; left: 0; right: 0; bottom: 0; z-index: 3; margin: 0; padding: 0 26px 20px; }
    .pv-card__row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .pv-card__price { font-size: 18px; font-weight: 800; color: #141a22; white-space: nowrap; }
    .pv-card__buy {
      min-width: 118px;
      padding: 13px 22px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      color: #17202a;
      background: #c9c9c9;
      border: 0;
      border-radius: 4px;
      transition: all .2s ease;
    }
    .pv-card__buy:hover { background: var(--k-black); color: #fff; }

    @media (max-width: 991px) {
      .pv-hero img { height: 320px; }
      .pv-wrap { padding: 40px 0 96px; }
      /* 탭 3개가 화면 폭을 1/3씩 나눠 갖도록 — 좌측 쏠림/우측 빈칸 방지 */
      .pv-tabs { gap: 0; justify-content: space-between; }
      .pv-tab { flex: 1 1 0; min-width: 0; font-size: 17px; padding: 0 2px 20px; white-space: nowrap; position: relative; border-bottom: 0; margin-bottom: 0; }
      /* 활성 언더라인: 칸 전체(1/3 폭)가 아니라 라벨 아래 중앙에만 */
      .pv-tab.is-active { border-bottom: 0; }
      .pv-tab.is-active::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -1px;
        transform: translateX(-50%);
        width: 64px;
        height: 4px;
        background: var(--k-black);
      }
      .pv-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 58px 24px; }
      .pv-card__media { height: 420px; padding-bottom: 68px; }
      .pv-card__body { padding: 0 14px 16px; }
    }
    @media (max-width: 575px) {
      .pv-hero img { height: 230px; }
      .pv-grid { grid-template-columns: 1fr; }
      .pv-card__media { height: 430px; padding-bottom: 70px; }
      .pv-card__label { left: 18px; top: 18px; font-size: 19px; }
      .pv-card__price { font-size: 20px; }
      .pv-card__buy { min-width: 104px; padding: 11px 18px; }
    }
  </style>
</head>

            <div class="pv-card__body">
              <div class="pv-card__row"><span class="pv-card__price">389.000W</span><a class="pv-card__buy" href="product-detail.html?id=necklace&opt=골드">Get now</a></div></div>

        <!-- Icheon Rice -->

  <!-- 위시리스트 토글 — vwWish(localStorage)에 저장, 마이페이지 위시 탭과 연동 -->
  <script>
    document.querySelectorAll('.pv-card__wish[data-wish]').forEach(function (button) {
      const productId = button.dataset.wish;
      const optionValue = button.dataset.wishOpt || null;
      button.classList.toggle('is-on', VW.isWished(productId, optionValue));
      button.addEventListener('click', function (event) {
        event.preventDefault();
        button.classList.toggle('is-on', VW.toggleWish(productId, optionValue));
      });
    });
  </script>
