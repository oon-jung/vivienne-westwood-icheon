<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>마이페이지 — Vivienne Westwood × 이천쌀</title>

  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="assets/css/custom.css?v=20260710b" rel="stylesheet">

  <style>
    #main.page { margin-top: var(--header-h); }
    .mp-wrap { padding: 60px 0 110px; }
    .mp-top { display: flex; align-items: center; gap: 18px; padding-bottom: 30px; margin-bottom: 36px; border-bottom: 1px solid var(--back-w4); }
    .mp-avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--back-w2); display: flex; align-items: center; justify-content: center; }
    .mp-avatar img { width: 38px; height: 38px; }
    .mp-top h1 { font-size: 22px; font-weight: 800; margin: 0; }
    .mp-top p { font-size: 13px; color: var(--grey-600); margin: 2px 0 0; }
    .mp-top .out { margin-left: auto; font-size: 13px; color: var(--grey-600); }
    .mp-tabs { display: flex; gap: 30px; border-bottom: 1px solid var(--back-w4); margin-bottom: 40px; }
    .mp-tab { background: none; border: 0; padding: 0 2px 16px; font-size: 16px; font-weight: 600; color: var(--grey-600); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .mp-tab.is-active { color: var(--k-black); border-bottom-color: var(--k-black); }
    .mp-panel { display: none; }
    .mp-panel.is-active { display: block; }
    .mp-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
    .mp-card { border: 1px solid var(--back-w4); border-radius: 4px; overflow: hidden; }
    .mp-card__img { aspect-ratio: 1/1; overflow: hidden; background: var(--back-w2); }
    .mp-card__img img { width: 100%; height: 100%; object-fit: cover; }
    .mp-card__b { padding: 14px; }
    .mp-card__b h3 { font-size: 14px; font-weight: 700; margin: 0 0 6px; }
    .mp-card__b .pr { font-size: 14px; font-weight: 800; }
    .mp-list-item { display: grid; grid-template-columns: 70px 1fr auto auto; gap: 16px; align-items: center; padding: 18px 0; border-bottom: 1px solid var(--back-w4); }
    .mp-list-item img { width: 70px; height: 70px; border-radius: 4px; object-fit: cover; }
    .mp-list-item h3 { font-size: 15px; font-weight: 700; margin: 0 0 3px; }
    .mp-list-item p { font-size: 12px; color: var(--grey-600); margin: 0; }
    .mp-status { font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 20px; background: var(--back-w2); color: var(--grey-800); }
    .mp-status--done { background: #eafaf0; color: #1a8a4f; }
    .mp-empty { padding: 46px 0; color: var(--grey-600); font-size: 14px; }
    .mp-empty a { font-weight: 700; color: var(--k-black); text-decoration: underline; text-underline-offset: 3px; }
    @media (max-width: 991px) { .mp-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>

<body>

  <header id="header" class="fixed-top d-flex align-items-center">
  </header>

  <main id="main" class="page">
    <section class="mp-wrap">
      <div class="container" data-tab-root>
        <div class="mp-top">
          <div class="mp-avatar"><img src="assets/img/brand/orb.svg" alt=""></div>
          <!-- 로그인한 사용자(vwAuth) 이름·이메일을 JS가 채움 -->
          <div><h1 id="mpName">회원님</h1><p id="mpEmail"></p></div>
          <a class="out" href="#" data-logout="1">로그아웃 ›</a>
        </div>

        <div class="mp-tabs">
          <button class="mp-tab is-active" data-tab-target="wish">위시리스트</button>
          <button class="mp-tab" data-tab-target="cart">장바구니</button>
          <button class="mp-tab" data-tab-target="history">주문 내역</button>
        </div>

        <!-- 위시리스트 (vwWish 실데이터) -->
        <div class="mp-panel is-active" data-tab-panel="wish">
          <div id="mpWish"></div>
        </div>

        <!-- 장바구니 (vwCart 실데이터) -->
        <div class="mp-panel" data-tab-panel="cart">
          <div id="mpCart"></div>
        </div>

        <!-- 주문 내역 (vwOrders 실데이터) -->
        <div class="mp-panel" data-tab-panel="history">
          <div id="mpHistory"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- ======= Footer ======= -->
  <footer id="footer">
  </footer>

  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/purecounter/purecounter_vanilla.js"></script>
  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="assets/vendor/isotope-layout/isotope.pkgd.min.js"></script>
  <script src="assets/vendor/swiper/swiper-bundle.min.js"></script>
  <script src="assets/vendor/waypoints/noframework.waypoints.js"></script>
  <script src="assets/vendor/php-email-form/validate.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/app.js?v=20260710b"></script>
  <script>
    (function () {
      // 로그인한 사용자만 접근 — 이름/이메일은 vwAuth에서
      const auth = VW.getAuth();
      if (!auth) { location.replace('login.html'); return; }
      document.getElementById('mpName').textContent = auth.name + '님';
      document.getElementById('mpEmail').textContent = auth.email;

      function emptyHtml(message, withLink) {
        return '<p class="mp-empty">' + message + (withLink ? ' <a href="products.html">상품 보러 가기 ›</a>' : '') + '</p>';
      }

      function detailUrl(item) {
        return 'product-detail.html?id=' + item.id + '&opt=' + encodeURIComponent(item.opt);
      }

      // 위시리스트
      const wishItems = VW.getWish()
        .map(function (item) {
          const option = VW.findOption(item.id, item.opt);
          const product = VW.PRODUCTS[item.id];
          return product && option && { id: item.id, opt: option.val, name: product.name, price: option.price, img: option.img };
        })
        .filter(Boolean);
      document.getElementById('mpWish').innerHTML = wishItems.length
        ? '<div class="mp-grid">' + wishItems.map(function (item) {
            return '<a class="mp-card" href="' + detailUrl(item) + '"><div class="mp-card__img"><img src="' + item.img + '" alt=""></div>' +
              '<div class="mp-card__b"><h3>' + item.name + ' · ' + item.opt + '</h3><span class="pr">' + VW.formatWon(item.price) + '</span></div></a>';
          }).join('') + '</div>'
        : emptyHtml('위시리스트가 비어 있습니다.', true);

      // 장바구니
      const cartLines = VW.getCart().map(function (line) { return VW.resolveCartLine(line); }).filter(Boolean);
      document.getElementById('mpCart').innerHTML = cartLines.length
        ? cartLines.map(function (line) {
            return '<div class="mp-list-item"><img src="' + line.img + '" alt=""><div><h3>' + line.name + ' · ' + line.opt + '</h3>' +
              '<p>' + line.optionText + ' · 수량 ' + line.qty + '</p></div>' +
              '<span class="pr" style="font-weight:800">' + VW.formatWon(line.price * line.qty) + '</span>' +
              '<a class="btn-vw btn-vw--ghost" href="cart.html" style="padding:8px 16px;font-size:13px">구매하기</a></div>';
          }).join('') + '<div style="text-align:right;margin-top:24px"><a class="btn-vw btn-vw--solid" href="cart.html">전체 구매</a></div>'
        : emptyHtml('장바구니가 비어 있습니다.', true);

      // 주문 내역 (최신순)
      const orders = VW.getOrders().slice().reverse();
      document.getElementById('mpHistory').innerHTML = orders.length
        ? orders.map(function (order) {
            const extraCount = order.items.length - 1;
            const title = order.items[0].name + (extraCount > 0 ? ' 외 ' + extraCount + '건' : ' · ' + order.items[0].opt);
            return '<div class="mp-list-item"><img src="' + order.items[0].img + '" alt=""><div><h3>' + title + '</h3>' +
              '<p>' + order.no + ' · ' + VW.formatWon(order.total) + '</p></div>' +
              '<span class="mp-status">배송중</span>' +
              '<a class="btn-vw btn-vw--ghost" href="shipping.html" style="padding:8px 16px;font-size:13px">배송확인</a></div>';
          }).join('')
        : emptyHtml('주문 내역이 없습니다.', false);
    })();
  </script>
</body>
</html>
