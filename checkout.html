<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>주문서 — Vivienne Westwood × 이천쌀</title>

  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="assets/css/custom.css?v=20260710b" rel="stylesheet">

  <style>
    #main.page { margin-top: var(--header-h); }
    .co-wrap { padding: 60px 0 110px; }
    .co-wrap h1 { font-size: 30px; font-weight: 800; margin: 0 0 8px; }
    .co-steps { font-size: 13px; color: var(--grey-600); margin-bottom: 40px; }
    .co-steps b { color: var(--k-black); }
    .co-grid { display: grid; grid-template-columns: 1fr 340px; gap: 40px; align-items: start; }
    .co-block { margin-bottom: 36px; }
    .co-block h2 { font-size: 17px; font-weight: 800; margin: 0 0 16px; padding-bottom: 12px; border-bottom: 2px solid var(--k-black); }
    .co-field { margin-bottom: 16px; }
    .co-field label { display: block; font-size: 13px; font-weight: 600; color: var(--grey-800); margin-bottom: 7px; }
    .co-field input, .co-field select, .co-field textarea { width: 100%; padding: 12px 14px; border: 1px solid var(--back-w4); border-radius: 3px; font-size: 14px; font-family: inherit; }
    .co-field input:focus, .co-field textarea:focus, .co-field select:focus { outline: none; border-color: var(--k-black); }
    .co-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .co-pay { display: flex; gap: 10px; flex-wrap: wrap; }
    .co-pay label { flex: 1; min-width: 120px; border: 1px solid var(--back-w4); border-radius: 3px; padding: 14px; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--grey-700); }
    .co-pay input { display: none; }
    .co-pay input:checked + span { color: var(--k-black); }
    .co-pay label:has(input:checked) { border-color: var(--k-black); background: var(--back-w2); }

    .co-sum { border: 1px solid var(--back-w4); border-radius: 6px; padding: 26px; position: sticky; top: 100px; }
    .co-sum h2 { font-size: 18px; font-weight: 800; margin: 0 0 18px; }
    .co-sline { display: flex; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--back-w2); }
    .co-sline img { width: 46px; height: 46px; border-radius: 3px; object-fit: cover; }
    .co-sline .nm { font-size: 13px; flex: 1; }
    .co-sline .pr { font-size: 13px; font-weight: 700; }
    .co-sum .row { display: flex; justify-content: space-between; font-size: 14px; color: var(--grey-700); margin: 14px 0 0; }
    .co-sum .total { border-top: 1px solid var(--back-w4); padding-top: 14px; margin-top: 14px; font-size: 18px; font-weight: 800; color: var(--k-black); }
    .co-sum .btn-vw { width: 100%; margin-top: 18px; }
    @media (max-width: 991px) { .co-grid { grid-template-columns: 1fr; } }
  </style>
</head>

<body>

  <header id="header" class="fixed-top d-flex align-items-center">
  </header>

  <main id="main" class="page">
    <section class="co-wrap">
      <div class="container">
        <h1>주문서</h1>
        <p class="co-steps">01 장바구니 &nbsp;›&nbsp; <b>02 주문서</b> &nbsp;›&nbsp; 03 주문완료</p>

        <div class="co-grid">
          <form id="coForm" onsubmit="return false">
            <div class="co-block">
              <h2>배송지 정보</h2>
              <div class="co-field"><label for="coName">받는 분</label><input id="coName" type="text" placeholder="이름" required></div>
              <div class="co-field"><label for="coPhone">연락처</label><input id="coPhone" type="tel" placeholder="010-0000-0000" required></div>
              <div class="co-field"><label for="coAddr">주소</label><input id="coAddr" type="text" placeholder="주소를 입력하세요" required></div>
              <div class="co-field"><label for="coAddr2">상세 주소</label><input id="coAddr2" type="text" placeholder="상세 주소"></div>
              <div class="co-field"><label for="coMemo">배송 메모</label><textarea id="coMemo" rows="2" placeholder="부재 시 문 앞에 놓아주세요"></textarea></div>
            </div>
            <div class="co-block">
              <h2>결제 수단</h2>
              <div class="co-pay">
                <label><input type="radio" name="pay" checked><span>신용카드</span></label>
                <label><input type="radio" name="pay"><span>계좌이체</span></label>
                <label><input type="radio" name="pay"><span>간편결제</span></label>
              </div>
            </div>
          </form>

          <aside class="co-sum">
            <h2>주문 상품</h2>
            <!-- 장바구니(vwCart) 실데이터를 JS가 렌더 -->
            <div id="coLines"></div>
            <div class="row"><span>상품 금액</span><span id="coSumItems">0 W</span></div>
            <div class="row"><span>배송비</span><span>무료</span></div>
            <div class="row total"><span>총 결제금액</span><span id="coSumTotal">0 W</span></div>
            <button class="btn-vw btn-vw--solid" type="button" id="coPay">결제하기</button>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <!-- ======= Footer ======= -->
  <footer id="footer">
  </footer>

  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/purecounter/purecounter_vanilla.js"></script>
  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="assets/vendor/isotope-layout/isotope.pkgd.min.js"></script>
  <script src="assets/vendor/swiper/swiper-bundle.min.js"></script>
  <script src="assets/vendor/waypoints/noframework.waypoints.js"></script>
  <script src="assets/vendor/php-email-form/validate.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/app.js?v=20260710b"></script>
  <script>
    (function () {
      const lines = VW.getCart()
        .map(function (line) { return VW.resolveCartLine(line); })
        .filter(Boolean);

      // 빈 장바구니로 주문서 진입 방지
      if (!lines.length) { location.replace('cart.html'); return; }

      const total = lines.reduce(function (sum, line) { return sum + line.price * line.qty; }, 0);

      document.getElementById('coLines').innerHTML = lines.map(function (line) {
        return '<div class="co-sline"><img src="' + line.img + '" alt="' + line.name + '">' +
          '<span class="nm">' + line.name + ' · ' + line.opt + '<br><small style="color:#888">수량 ' + line.qty + '</small></span>' +
          '<span class="pr">' + VW.formatWon(line.price * line.qty) + '</span></div>';
      }).join('');
      document.getElementById('coSumItems').textContent = VW.formatWon(total);
      document.getElementById('coSumTotal').textContent = VW.formatWon(total);

      const payButton = document.getElementById('coPay');
      payButton.textContent = VW.formatWon(total) + ' 결제하기';

      // 로그인 사용자 이름으로 받는 분 미리 채움
      const auth = VW.getAuth();
      if (auth) document.getElementById('coName').value = auth.name;

      payButton.addEventListener('click', function () {
        const receiver = document.getElementById('coName').value.trim();
        const phone = document.getElementById('coPhone').value.trim();
        const address = document.getElementById('coAddr').value.trim();
        const addressDetail = document.getElementById('coAddr2').value.trim();
        if (!receiver || !phone || !address) {
          alert('받는 분 · 연락처 · 주소를 입력해주세요.');
          return;
        }

        const now = new Date();
        const two = function (value) { return String(value).padStart(2, '0'); };
        const stamp = String(now.getFullYear()).slice(2) + two(now.getMonth() + 1) + two(now.getDate());
        const orderNo = 'VW-ICHEON-' + stamp + '-' + String(VW.getOrders().length + 1).padStart(4, '0');

        VW.addOrder({
          no: orderNo,
          date: now.toISOString().slice(0, 10),
          receiver: receiver,
          addr: [address, addressDetail].filter(Boolean).join(' '),
          total: total,
          items: lines.map(function (line) {
            return { name: line.name, opt: line.opt, optionText: line.optionText, qty: line.qty, price: line.price, img: line.img };
          })
        });
        VW.setCart([]);
        location.href = 'order-complete.html';
      });
    })();
  </script>
</body>
</html>
